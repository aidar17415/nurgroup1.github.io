<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нұрай, мені кешірші</title>
    <style>
        @import url('https        cd "C:\Users\NUR GROUP\OneDrive\Документы"
        git init
        git add index.html
        git commit -m "Add apology page"
        git branch -M main
        git remote add origin https://github.com/aidal17415/nurgroup.github.io.git
        git push -u origin main://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');

        body {
            background: linear-gradient(135deg, #ffb6c1, #ffc0cb); /* Ашық қызғылт фон */
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Айналадағы жүрекшелерге арналған стиль */
        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Ортадағы карточка */
        .card {
            background: rgba(255, 235, 238, 0.85); /* Ақ-қызғылт шыны эффекті */
            backdrop-filter: blur(10px);
            padding: 40px 50px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(219, 112, 147, 0.3);
            text-align: center;
            z-index: 10;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Суреттің стилі */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .edit-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #e63946;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid white;
            font-size: 14px;
        }

        /* Мәтіндер */
        h1 {
            color: #b9375e; /* Қою қызғылт */
            font-size: 26px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        p {
            color: #d16b86;
            font-size: 16px;
            margin: 0 0 25px 0;
            font-weight: 700;
        }

        /* Ия батырмасы (Ортада) */
        #yesBtn {
            background-color: #38b065; /* Жасыл */
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(56, 176, 101, 0.4);
            transition: transform 0.2s;
        }

        #yesBtn:active {
            transform: scale(0.95);
        }

        /* Жоқ батырмасы (Төменгі оң жақта) */
        #noBtn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background-color: #e63946; /* Қызыл */
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
            z-index: 20;
            transition: top 0.2s ease, left 0.2s ease; /* Жүгіру анимациясы */
        }

        #success-gif {
            display: none;
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- Артқы фондағы ұшатын жүрекшелер -->
    <div class="floating-hearts" id="hearts-container"></div>

    <!-- Ортадағы карточка -->
    <div class="card" id="main-card">
        <div class="avatar-container" id="avatar-div">
            <!-- Суреттің URL-ын өзгертіңіз -->
            <img class="avatar" src="https://via.placeholder.com/110/ffb6c1/ffffff?text=💕" alt="Қыздың суреті">
            <div class="edit-icon">✏️</div>
        </div>

        <h1 id="title">Нұрай, мені<br>кешірші</h1>
        <p id="subtitle">кешіресің ба? 🥺</p>

        <button id="yesBtn">Ия 💚</button>
        <img id="success-gif" src="https://media.giphy.com/media/l0HlDtKCoZmsfkw9i/giphy.gif" alt="Кешірді">
    </div>

    <!-- Қашатын батырма -->
    <button id="noBtn">Жоқ ❌</button>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const avatarDiv = document.getElementById('avatar-div');
        const successGif = document.getElementById('success-gif');

        // Қашу логикасы
        function moveNoButton() {
            // Экран шекарасынан шығып кетпеуін есептеу
            const x = Math.floor(Math.random() * (window.innerWidth - noBtn.clientWidth - 20));
            const y = Math.floor(Math.random() * (window.innerHeight - noBtn.clientHeight - 20));

            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.style.bottom = 'auto';
            noBtn.style.right = 'auto';
        }

        // Компьютерде тышқан тигенде, телефонда басуға әрекеттенгенде қашады
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Телефонда басылып қалуының алдын алады
            moveNoButton();
        });

        // "Ия" батырмасын басқанда
        yesBtn.addEventListener('click', () => {
            avatarDiv.style.display = 'none'; // Суретті жасырамыз
            yesBtn.style.display = 'none'; // Ия батырмасын жасырамыз
            noBtn.style.display = 'none'; // Жоқ батырмасын жоямыз
            
            title.innerHTML = "Жаным сол! Кешіретініңді білгем ❤️";
            subtitle.innerHTML = "Енді ренжітпеймін!";
            successGif.style.display = 'block'; // 
        });

        // Артқы фонға жүрекшелер шығару
        const heartsContainer = document.getElementById('hearts-container');
        const symbols = ['💖', '✨', '🌸', '💕'];
        
        for (let i = 0; i < 20; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; // 3-6 секунд
            heart.style.animationDelay = Math.random() * 5 + 's';
            heartsContainer.appendChild(heart);
        }
    </script>

</body>
</html>
